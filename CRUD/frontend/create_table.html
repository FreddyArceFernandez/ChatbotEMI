<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Tabla</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container mt-5">
    <h2>Crear Nueva Tabla</h2>
    <form id="table-form">
      <div class="mb-3">
        <label for="table-name" class="form-label">Nombre de la Tabla</label>
        <input type="text" id="table-name" class="form-control" required>
      </div>
      <div id="columns-container"></div>
      <button type="button" class="btn btn-secondary mb-3" onclick="addColumn()">Agregar Columna</button>
      <br>
      <button type="submit" class="btn btn-primary">Crear Tabla</button>
    </form>
  </div>

  <script>
    let columnCount = 0;
    function addColumn() {
      const container = document.getElementById("columns-container");
      const html = `
        <div class="row mb-2">
          <div class="col">
            <input type="text" class="form-control" placeholder="Nombre" name="col-name-${columnCount}" required>
          </div>
          <div class="col">
            <select class="form-control" name="col-type-${columnCount}">
              <option value="INT">INT</option>
              <option value="VARCHAR(255)">VARCHAR(255)</option>
              <option value="TEXT">TEXT</option>
            </select>
          </div>
        </div>`;
      container.insertAdjacentHTML("beforeend", html);
      columnCount++;
    }

    document.getElementById("table-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const tableName = document.getElementById("table-name").value;
      const columns = [];
      for (let i = 0; i < columnCount; i++) {
        const name = document.querySelector(`[name=col-name-${i}]`).value;
        const type = document.querySelector(`[name=col-type-${i}]`).value;
        columns.push({ name, type });
      }

      fetch("http://localhost:8001/tables/create", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ table_name: tableName, columns }),
      })
        .then(res => res.json())
        .then(data => {
          alert(data.message);
          window.location.href = "index.html";
        });
    });

    addColumn(); // Al menos una columna al iniciar
  </script>
</body>
</html>
